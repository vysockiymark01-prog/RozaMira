<!doctype html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Страница не найдена — Роза Мира</title>
<meta name="robots" content="noindex">
<style>
:root{--bg:#f6f1e7;--ink:#2c2620;--accent:#9c3a52}
@media(prefers-color-scheme:dark){:root{--bg:#13131a;--ink:#e9e4da;--accent:#d98aa0}}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Georgia,serif;
 display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center}
h1{color:var(--accent);font-size:4rem;margin:0}
a{display:inline-block;margin-top:18px;padding:11px 22px;border-radius:10px;
 background:var(--accent);color:#fff;text-decoration:none;font-family:system-ui,sans-serif}
</style></head><body><main>
<h1>404</h1><p>Такой страницы нет. Возможно, ссылка устарела.</p>
<a id="home" href="/">На главную</a>
<script>
/* корень сайта: для GitHub Pages вида /репозиторий/... берём первый сегмент пути */
try{var seg=location.pathname.split('/')[1];
document.getElementById('home').href = (seg && location.hostname.endsWith('github.io')) ? '/'+seg+'/' : '/';}catch(e){}
</script>
</main></body></html>
